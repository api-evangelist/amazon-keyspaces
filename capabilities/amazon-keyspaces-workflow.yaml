naftiko: 1.0.0-alpha1
info:
  label: Amazon Keyspaces Workflow
  description: Unified workflow capability for Amazon Keyspaces combining resource management and operations.
  tags:
  - Amazon Keyspaces
  - AWS
  - Workflow
  created: '2026-04-19'
  modified: '2026-04-19'
binds:
- namespace: env
  keys:
    AWS_ACCESS_KEY_ID: AWS_ACCESS_KEY_ID
    AWS_SECRET_ACCESS_KEY: AWS_SECRET_ACCESS_KEY
capability:
  consumes:
  - import: keyspaces
    location: ./shared/keyspaces.yaml
  exposes:
  - type: rest
    port: 8080
    namespace: keyspaces-api
    description: REST API for Amazon Keyspaces workflow.
    resources: []
  - type: mcp
    port: 9090
    namespace: keyspaces-mcp
    transport: http
    description: MCP server for Amazon Keyspaces.
    tools:
    - name: keyspaces-create-keyspace
      description: Creates a new keyspace.
      hints:
        readOnly: false
        idempotent: false
      call: keyspaces.createkeyspace
      outputParameters:
      - type: object
        mapping: $.
    - name: keyspaces-list-keyspaces
      description: Returns a list of keyspaces.
      hints:
        readOnly: true
        idempotent: true
      call: keyspaces.listkeyspaces
      outputParameters:
      - type: object
        mapping: $.
    - name: keyspaces-get-keyspace
      description: Returns the name and the Amazon Resource Name (ARN) of a keyspace.
      hints:
        readOnly: true
        idempotent: true
      call: keyspaces.getkeyspace
      outputParameters:
      - type: object
        mapping: $.
    - name: tables-create-table
      description: The CreateTable operation adds a new table to the specified keyspace.
      hints:
        readOnly: false
        idempotent: false
      call: keyspaces.createtable
      outputParameters:
      - type: object
        mapping: $.
    - name: tables-list-tables
      description: Returns a list of tables for a specified keyspace.
      hints:
        readOnly: true
        idempotent: true
      call: keyspaces.listtables
      outputParameters:
      - type: object
        mapping: $.
    - name: tables-get-table
      description: Returns information about the table.
      hints:
        readOnly: true
        idempotent: true
      call: keyspaces.gettable
      outputParameters:
      - type: object
        mapping: $.
